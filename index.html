<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<title>عيد ميلاد سعيد ❤️</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin: 0;
  }
  .box {
    background: rgba(0,0,0,0.3);
    padding: 20px;
    border-radius: 15px;
    max-width: 90%;
    margin: auto;
  }
  input, button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    margin-top: 10px;
  }
  button { cursor: pointer; background:#ff5555; color:white; }
  #content { display: none; }
  #love { display: none; font-size: 2.5em; margin-top: 20px; color: #ffdd00; }
  #timer { font-size: 1.5em; margin-top: 15px; }
</style>
</head>
<body><div class="box" id="login">
  <h2>ادخلي الباسورد 🎁</h2>
  <input type="password" id="password" placeholder="تاريخ ميلادك">
  <br>
  <button onclick="checkPassword()">دخول</button>
</div><div class="box" id="content">
  <h1>كل سنه وانتي معايا يا أحلي هدية ♥️🫂</h1>
  <h1>وربنا ما يحرمني منك ي ام عيالي 🙂</h1>
  <div id="songContainer">
    <button id="playBtn">▶ شغّل الأغنية</button>
  </div>
  <div id="love">💖 بحبــــكـ ي روح قلبـــي ♥️</div>
  <div id="timer"></div>
</div><script>
const correctPassword = "6/2/2012";
const startDate = new Date("2025-07-16T20:20:00");

function checkPassword() {
  const input = document.getElementById("password").value;
  if(input === correctPassword) {
    document.getElementById("login").style.display = "none";
    document.getElementById("content").style.display = "block";
    startTimer();
  } else {
    alert("الباسورد غلط 😅");
  }
}

function startTimer() {
  const timerDiv = document.getElementById('timer');
  function updateTimer() {
    const now = new Date();
    let diff = now - startDate;
    if(diff < 0) diff = 0;
    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((diff % (1000*60)) / 1000);
    timerDiv.textContent = `إحنا مع بعض من: ${days} يوم ${hours} ساعة ${minutes} دقيقة ${seconds} ثانية`;
  }
  updateTimer();
  setInterval(updateTimer, 1000);
}

// زر تشغيل الأغنية وكلمة بحبك تظهر بعد الضغط
const playBtn = document.getElementById('playBtn');
playBtn.addEventListener('click', () => {
  // استبدل الفيديو باللينك الصحيح على YouTube إذا حابب
  const iframe = document.createElement('iframe');
  iframe.src = 'https://www.youtube.com/embed/87-lHfZvW0o?autoplay=1';
  iframe.width = '100%';
  iframe.height = '200';
  iframe.allow = 'autoplay; encrypted-media';
  document.getElementById('songContainer').appendChild(iframe);
  playBtn.style.display = 'none';
  document.getElementById('love').style.display = 'block';
});
</script></body>
</html>
